<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcela Já · SDR Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0E3044; font-family:'Inter',sans-serif; color:#fff; }
.wrap { max-width:1300px; margin:0 auto; padding:20px 28px 60px; }
h1 { font-size:22px; font-weight:800; }
h1 .lime { color:#B4D420; }
h1 .sub { color:#C8D8E0; font-weight:400; font-size:15px; margin-left:10px; }
.meta { color:#C8D8E0; font-size:11px; margin-top:2px; }
.filter-bar { background:#1B4A5E; border-radius:10px; padding:10px 16px; margin:12px 0 8px; border:1px solid #2A6080; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.filter-label { color:#B4D420; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; white-space:nowrap; }
.preset { background:#0E3044; color:#C8D8E0; border:1px solid #2A6080; padding:5px 12px; font-size:11px; font-weight:600; cursor:pointer; border-radius:6px; font-family:inherit; transition:all .15s; }
.preset:hover { border-color:#B4D420; color:#fff; }
.preset.active { background:#B4D420; color:#0E3044; border-color:#B4D420; }
.date-input { background:#0E3044; color:#fff; border:1px solid #2A6080; border-radius:6px; padding:4px 8px; font-size:11px; font-family:inherit; }
.custom-wrap { margin-left:auto; display:flex; gap:6px; align-items:center; }
.custom-label { color:#C8D8E0; font-size:10px; }
.arrow { color:#B4D420; font-size:12px; font-weight:700; }
.mode-bar { background:#1B4A5E; border-radius:10px; padding:8px 16px; margin-bottom:16px; border:1px solid #2A6080; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.mode-btn { background:#0E3044; color:#C8D8E0; border:1px solid #2A6080; padding:5px 12px; font-size:11px; font-weight:600; cursor:pointer; border-radius:6px; font-family:inherit; transition:all .15s; }
.mode-btn:hover { border-color:#B4D420; color:#fff; }
.mode-btn.active { background:#B4D420; color:#0E3044; border-color:#B4D420; }
.mode-hint { color:#C8D8E0; font-size:10px; margin-left:4px; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:24px; }
.kpi { background:#1B4A5E; border-radius:12px; padding:14px 16px; border:1px solid #2A6080; position:relative; overflow:hidden; }
.kpi .bar { position:absolute; top:0; left:0; right:0; height:3px; }
.kpi .label { color:#C8D8E0; font-size:9px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; margin-bottom:4px; }
.kpi .val { font-size:26px; font-weight:800; line-height:1.1; }
.kpi .sub { color:#C8D8E0; font-size:10px; margin-top:4px; }
.section { margin-bottom:28px; }
.section-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.section-sub { color:#C8D8E0; font-size:11px; margin-bottom:14px; }
.card { background:#1B4A5E; border-radius:12px; padding:20px; border:1px solid #2A6080; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.sdr-header { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.sdr-ring { position:relative; width:80px; height:80px; flex-shrink:0; }
.sdr-ring canvas { width:80px!important; height:80px!important; }
.sdr-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; }
.sdr-name { font-size:14px; font-weight:700; margin-bottom:4px; }
.sdr-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px 12px; font-size:11px; }
.sdr-stats .lbl { color:#C8D8E0; font-size:9px; }
.sdr-formula { margin-top:10px; padding:6px 10px; background:#0E3044; border-radius:6px; font-size:10px; color:#C8D8E0; }
.sdr-formula b { color:#fff; }
.goal-wrap { margin-top:14px; margin-bottom:18px; }
.goal-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; gap:12px; flex-wrap:wrap; }
.goal-label { font-size:10px; font-weight:600; color:#C8D8E0; }
.goal-pct { font-size:12px; font-weight:800; }
.goal-track { background:#0E3044; border-radius:8px; height:24px; position:relative; }
.goal-fill { height:100%; border-radius:8px; transition:width .3s; position:relative; min-width:2px; }
.goal-marker { position:absolute; top:-4px; bottom:-4px; width:2px; background:#fff; border-radius:1px; z-index:2; }
.goal-marker-label { position:absolute; bottom:-16px; font-size:8px; color:#C8D8E0; transform:translateX(-50%); white-space:nowrap; font-weight:600; }
.goal-count { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; z-index:1; pointer-events:none; }
.funnel-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.funnel-label { width:70px; text-align:right; color:#C8D8E0; font-size:10px; flex-shrink:0; }
.funnel-bar { height:20px; border-radius:4px; display:flex; align-items:center; padding-left:6px; min-width:30px; }
.funnel-rate { font-size:11px; font-weight:800; }
.stage-card { background:#0E3044; border-radius:10px; padding:16px; text-align:center; }
.stage-num { font-size:36px; font-weight:800; line-height:1; }
.stage-unit { font-size:9px; color:#C8D8E0; margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }
.chart-container { position:relative; height:260px; }
.chart-container-sm { position:relative; height:220px; }
.source-legend { display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:12px; }
.source-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; }
.source-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
@media(max-width:900px){.grid2{grid-template-columns:1fr;}}
</style>
</head>

const C = {lime:"#B4D420",teal:"#2A6080",navy:"#0E3044",navyMed:"#1B4A5E",muted:"#C8D8E0",danger:"#ef4444",warning:"#f59e0b",ff:"#B4D420",jm:"#5BA0C8"};
const SRC_COLORS = {"Lead generation":"#B4D420","Midky":"#5BA0C8","Inbound":"#f59e0b","Consolidador":"#a78bfa","Sem source":"#6b7280"};
const STAGE_ORDER = ["Prospecting","Lead qualified","In decision/meeting","Signing","Contracts Unicre","Closed won","Closed lost","Recycle"];
const ACTIVE = ["Prospecting","Lead qualified","In decision/meeting","Signing","Contracts Unicre"];
const FUNNEL = ["Prospecting","Lead qualified","In decision/meeting","Signing","Contracts Unicre","Closed won"];
const SLEVEL = {"Prospecting":0,"Lead qualified":1,"In decision/meeting":2,"Signing":3,"Contracts Unicre":4,"Closed won":5,"Closed lost":-1,"Recycle":-1};
const SSHORT = {"Prospecting":"Prospect","Lead qualified":"Lead","In decision/meeting":"Decision","Signing":"Signing","Contracts Unicre":"Contracts","Closed won":"Won"};
const ONAMES = {FF:"Francisco Faro",JM:"João Malaquias"};
const GOAL_PER_SDR = 40;
const MODE_HINTS = {"won":"Apenas deals Closed Won","won+cu":"Closed Won + Contracts Unicre","won+si+cu":"Closed Won + Signing + Contracts Unicre"};

const PRESETS = [
  {label:"Tudo (desde 1 Fev)",from:"2026-02-01",to:"2026-04-30"},
  {label:"Abril 2026",from:"2026-04-01",to:"2026-04-30"},
  {label:"Março 2026",from:"2026-03-01",to:"2026-03-31"},
  {label:"Últimas 2 sem",from:"2026-03-30",to:"2026-04-13"},
  {label:"Fevereiro",from:"2026-02-01",to:"2026-02-28"},
];

let activePreset=0, wonMode="won", charts=[];

function isWon(d,mode){
  if(d.s==="Closed won") return true;
  if(mode==="won+cu"&&d.s==="Contracts Unicre") return true;
  if(mode==="won+si+cu"&&(d.s==="Contracts Unicre"||d.s==="Signing")) return true;
  return false;
}

function monthsBetween(from,to){
  const f=new Date(from),t=new Date(to);
  const diff=(t.getFullYear()-f.getFullYear())*12+t.getMonth()-f.getMonth();
  return Math.max(1, diff + (t.getDate()>1?1:0));
}

function compute(from,to){
  const mode=wonMode;
  const fd=RAW.filter(d=>[d.cd,d.ad,d.lc,d.cw,d.cl].filter(Boolean).some(dt=>dt.substring(0,10)>=from&&dt.substring(0,10)<=to));
  const by={FF:[],JM:[]};
  fd.forEach(d=>{if(by[d.o])by[d.o].push(d);});
  // Snapshot buckets (all deals, no date filter) — for Signing/Contracts Unicre counts
  const bySnap={FF:[],JM:[]};
  RAW.forEach(d=>{if(bySnap[d.o])bySnap[d.o].push(d);});

  const months=monthsBetween(from,to);
  const goalPerSDR=GOAL_PER_SDR*months;
  const goalTotal=goalPerSDR*2;
  const now=new Date("2026-04-13");

  const om={};
  for(const [k,od] of Object.entries(by)){
    // Closed won: filtered by closedate in period
    const won_cw=od.filter(d=>d.s==="Closed won"&&d.ad&&d.ad.substring(0,10)>=from&&d.ad.substring(0,10)<=to);
    // Contracts Unicre + Signing: snapshot (all current, regardless of period activity)
    const snap=bySnap[k]||[];
    const won_cu=(mode==="won+cu"||mode==="won+si+cu")?snap.filter(d=>d.s==="Contracts Unicre"):[];
    const won_si=mode==="won+si+cu"?snap.filter(d=>d.s==="Signing"):[];
    const won=[...won_cw,...won_cu,...won_si];
    const lost=od.filter(d=>d.s==="Closed lost"&&d.ad&&d.ad.substring(0,10)>=from&&d.ad.substring(0,10)<=to);
    const active=od.filter(d=>ACTIVE.includes(d.s)&&!isWon(d,mode));
    // worked: period-worked deals + snapshot won deals not already in od
    const odKeys=new Set(od.map(d=>d.dc+"§"+d.cd));
    const extraWon=[...won_cu,...won_si].filter(d=>!odKeys.has(d.dc+"§"+d.cd));
    const workedBase=od.filter(d=>d.na>0||d.s==="Closed won"||d.s==="Closed lost");
    const worked=[...workedBase,...extraWon];
    const wAct=od.filter(d=>d.na>0);
    const cNA=od.filter(d=>(isWon(d,mode)||d.s==="Closed lost")&&d.na===0);
    const wwd=won.filter(d=>d.dc>0);

    const reached={};FUNNEL.forEach(s=>reached[s]=0);
    od.forEach(d=>{
      const lv=SLEVEL[d.s];
      if(lv>=0){for(let i=0;i<=lv;i++)reached[FUNNEL[i]]++;}
      else{let mx=0;if(d.elq)mx=Math.max(mx,1);if(d.eid)mx=Math.max(mx,2);if(d.esi)mx=Math.max(mx,3);if(d.ecu)mx=Math.max(mx,4);if(d.cw)mx=Math.max(mx,5);for(let i=0;i<=mx;i++)reached[FUNNEL[i]]++;}
    });
    const fc=[];
    for(let i=0;i<FUNNEL.length-1;i++){const f=reached[FUNNEL[i]],t=reached[FUNNEL[i+1]];fc.push({from:SSHORT[FUNNEL[i]],to:SSHORT[FUNNEL[i+1]],fc:f,tc:t,rate:f>0?Math.round(t/f*1000)/10:0});}

    // Stage durations
    const sigDays=[],cuDays=[];
    (bySnap[k]||[]).forEach(d=>{
      if(d.esi){const e=new Date(d.esi);let x;if(d.ecu)x=new Date(d.ecu);else if(d.cw)x=new Date(d.cw);else if(d.s==="Signing")x=now;else return;sigDays.push(Math.max(0,Math.floor((x-e)/864e5)));}
      if(d.ecu){const e=new Date(d.ecu);let x;if(d.cw)x=new Date(d.cw);else if(d.s==="Contracts Unicre")x=now;else return;cuDays.push(Math.max(0,Math.floor((x-e)/864e5)));}
    });

    // Source breakdown for won deals
    const srcMap={};
    won.forEach(d=>{const s=d.src||"Sem source";srcMap[s]=(srcMap[s]||0)+1;});

    const goalPct=goalPerSDR>0?Math.round(won.length/goalPerSDR*1000)/10:0;

    om[k]={
      name:ONAMES[k],total:od.length,worked:worked.length,
      won:won.length,lost:lost.length,active:active.length,
      cr:worked.length>0?Math.round(won.length/worked.length*1000)/10:0,
      acts:od.reduce((s,d)=>s+d.na,0),
      avgAct:od.length>0?Math.round(od.reduce((s,d)=>s+d.na,0)/od.length*10)/10:0,
      wAct:wAct.length,cNA:cNA.length,
      avgDays:wwd.length>0?Math.round(wwd.reduce((s,d)=>s+d.dc,0)/wwd.length*10)/10:0,
      wonDC:wwd.length,fc,reached,
      avgSig:sigDays.length>0?Math.round(sigDays.reduce((a,b)=>a+b,0)/sigDays.length*10)/10:null,
      avgCU:cuDays.length>0?Math.round(cuDays.reduce((a,b)=>a+b,0)/cuDays.length*10)/10:null,
      sigCount:sigDays.length,cuCount:cuDays.length,
      goalTarget:goalPerSDR,goalPct,srcMap
    };
  }

  // Global stage durations
  const gSig=[],gCU=[];
  RAW.forEach(d=>{
    if(d.esi){const e=new Date(d.esi);let x;if(d.ecu)x=new Date(d.ecu);else if(d.cw)x=new Date(d.cw);else if(d.s==="Signing")x=now;else return;gSig.push(Math.max(0,Math.floor((x-e)/864e5)));}
    if(d.ecu){const e=new Date(d.ecu);let x;if(d.cw)x=new Date(d.cw);else if(d.s==="Contracts Unicre")x=now;else return;gCU.push(Math.max(0,Math.floor((x-e)/864e5)));}
  });

  // Global source for won
  const gSrcMap={};
  fd.filter(d=>isWon(d,mode)).forEach(d=>{const s=d.src||"Sem source";gSrcMap[s]=(gSrcMap[s]||0)+1;});

  const tw=(om.FF?.worked||0)+(om.JM?.worked||0);
  const twn=(om.FF?.won||0)+(om.JM?.won||0);
  const tl=(om.FF?.lost||0)+(om.JM?.lost||0);
  const ta=(om.FF?.active||0)+(om.JM?.active||0);

  return {
    n:fd.length,
    s:{total:fd.length,active:ta,won:twn,lost:tl,worked:tw,
       cr:tw>0?Math.round(twn/tw*1000)/10:0},
    ff:om.FF,jm:om.JM,
    goalTotal,goalPerSDR,months,
    avgSigG:gSig.length>0?Math.round(gSig.reduce((a,b)=>a+b,0)/gSig.length*10)/10:null,
    avgCUG:gCU.length>0?Math.round(gCU.reduce((a,b)=>a+b,0)/gCU.length*10)/10:null,
    sigCG:gSig.length,cuCG:gCU.length,
    gSrcMap
  };
}

function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}

function goalBarHTML(label,current,target,color){
  const pct=target>0?Math.round(current/target*1000)/10:0;
  const barColor=pct>=100?C.lime:pct>=60?C.warning:C.danger;
  // For overachievement: bar fills proportionally, with a marker at the 100% point
  let fillPctCSS, markerHTML='';
  if(pct>100){
    // Scale: max bar = pct%, marker at (100/pct*100)%
    fillPctCSS=Math.min(100, pct/1.5); // cap visual at ~150% fills the bar
    const markerAt=100/pct*100/1.5*100; // position of 100% mark within the track
    const markerAtClamped=Math.min(100/pct*fillPctCSS*100/100*1.5, fillPctCSS);
    const mp = (100/pct)*100;
    markerHTML='<div class="goal-marker" style="left:'+mp+'%"><div class="goal-marker-label">Meta '+target+'</div></div>';
    fillPctCSS=100; // fill the whole bar
  } else {
    fillPctCSS=Math.max(pct,1);
  }
  return '<div class="goal-wrap"><div class="goal-header"><span class="goal-label">'+label+'</span><span class="goal-pct" style="color:'+barColor+'">'+pct+'% <span style="font-weight:400;color:'+C.muted+'">('+current+'/'+target+')</span></span></div>'+
    '<div class="goal-track">'+markerHTML+'<div class="goal-fill" style="width:'+fillPctCSS+'%;background:'+barColor+'"></div></div></div>';
}

function sdrCard(o){
  const cr=o.cr,color=cr>=8?C.lime:cr>=4?C.warning:C.danger;
  return '<div class="card"><div class="sdr-header">'+
    '<div class="sdr-ring"><canvas id="ring-'+o.name.split(" ")[0]+'"></canvas><div class="sdr-pct" style="color:'+color+'">'+cr+'%</div></div>'+
    '<div><div class="sdr-name">'+o.name+'</div>'+
    '<div class="sdr-stats">'+
    '<div><div class="lbl">Trabalhados</div><b>'+o.worked+'</b></div>'+
    '<div><div class="lbl">Won</div><b style="color:'+C.lime+'">'+o.won+'</b></div>'+
    '<div><div class="lbl">Lost</div><b style="color:'+C.danger+'">'+o.lost+'</b></div>'+
    '<div><div class="lbl">Ativos</div><b style="color:'+C.teal+'">'+o.active+'</b></div>'+
    '<div><div class="lbl">C/ atividade</div><b>'+o.wAct+'</b></div>'+
    '<div><div class="lbl">S/ nota</div><b style="color:'+C.muted+'">'+o.cNA+'</b></div>'+
    '</div></div></div>'+
    '<div class="sdr-formula"><b>'+o.won+' won</b> / <b>'+o.worked+' trabalhados</b> <span style="color:'+color+';font-weight:800;margin-left:4px">= '+cr+'%</span></div>'+
    goalBarHTML("Meta: "+o.goalTarget+" deals",o.won,o.goalTarget,C.lime)+
    '</div>';
}

function funnelHTML(name,data,color){
  if(!data||!data.length)return'';
  const mx=data[0].fc||1;
  let h='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:'+color+'"></div><span style="font-size:12px;font-weight:700">'+name+'</span></div>';
  data.forEach(step=>{
    const w=Math.max(step.fc/mx*100,8);
    const rc=step.rate>=50?C.lime:step.rate>=35?C.warning:C.danger;
    h+='<div class="funnel-row"><div class="funnel-label">'+step.from+'</div><div style="flex:1;display:flex;align-items:center;gap:5px"><div class="funnel-bar" style="width:'+w+'%;background:'+color+'44"><span style="color:#fff;font-size:9px;font-weight:600">'+step.fc+'</span></div><span style="color:'+C.muted+';font-size:9px">→</span><span class="funnel-rate" style="color:'+rc+'">'+step.rate+'%</span></div></div>';
  });
  const last=data[data.length-1];
  h+='<div class="funnel-row"><div class="funnel-label">Won</div><div class="funnel-bar" style="width:'+Math.max(last.tc/mx*100,8)+'%;background:'+C.lime+'55"><span style="color:#fff;font-size:9px;font-weight:700">'+last.tc+'</span></div></div>';
  return h;
}

function srcLegend(srcMap){
  const sorted=Object.entries(srcMap).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,e)=>s+e[1],0);
  return '<div class="source-legend">'+sorted.map(([name,count])=>{
    const pct=total>0?Math.round(count/total*1000)/10:0;
    const col=SRC_COLORS[name]||"#888";
    return '<div class="source-legend-item"><div class="source-dot" style="background:'+col+'"></div><span>'+name+' <b>'+count+'</b> ('+pct+'%)</span></div>';
  }).join('')+'</div>';
}

function render(){
  destroyCharts();
  const from=document.getElementById("date-from").value;
  const to=document.getElementById("date-to").value;
  const m=compute(from,to);
  const {s,ff,jm}=m;

  // deal count removed from header
  const ml=wonMode==="won"?"":"("+MODE_HINTS[wonMode].replace("Closed Won + ","+ ")+")";
  const teamGoalPct=m.goalTotal>0?Math.round(s.won/m.goalTotal*1000)/10:0;
  const teamGC=teamGoalPct>=100?C.lime:teamGoalPct>=60?C.warning:C.danger;

  document.getElementById("kpis").innerHTML=[
    '<div class="kpi"><div class="bar" style="background:'+(s.cr>=5?C.lime:C.danger)+'"></div><div class="label">Conversion Rate</div><div class="val">'+s.cr+'%</div><div class="sub">'+s.won+' won / '+s.worked+' trabalhados</div></div>',
    '<div class="kpi"><div class="bar" style="background:'+C.lime+'"></div><div class="label">Won '+ml+'</div><div class="val">'+s.won+'</div><div class="sub">Meta: '+m.goalTotal+' ('+m.months+'m)</div></div>',
    '<div class="kpi"><div class="bar" style="background:'+teamGC+'"></div><div class="label">Goal Equipa</div><div class="val" style="color:'+teamGC+'">'+teamGoalPct+'%</div><div class="sub">'+s.won+' / '+m.goalTotal+'</div></div>',
    '<div class="kpi"><div class="bar" style="background:'+C.teal+'"></div><div class="label">Pipeline Ativo</div><div class="val">'+s.active+'</div></div>',
    '<div class="kpi"><div class="bar" style="background:'+C.danger+'"></div><div class="label">Lost</div><div class="val">'+s.lost+'</div></div>',
  ].join("");

  let h='';

  // Section 1: Conversion per SDR
  h+='<div class="section"><div class="section-title">Conversion Rate por SDR</div><div class="section-sub">Won / Deals Trabalhados (com atividade ou fechados)</div>';
  h+='<div class="grid2">';
  if(ff) h+=sdrCard(ff);
  if(jm) h+=sdrCard(jm);
  h+='</div></div>';

  // Section 2: Goal Achievement
  h+='<div class="section"><div class="card">';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:12px">Goal Achievement · Equipa</div>';
  if(ff) h+=goalBarHTML("Francisco Faro",ff.won,ff.goalTarget,C.ff);
  if(jm) h+=goalBarHTML("João Malaquias",jm.won,jm.goalTarget,C.jm);
  h+=goalBarHTML("Total Equipa",(ff?.won||0)+(jm?.won||0),m.goalTotal,C.lime);
  h+='</div></div>';

  // Section 3: Pipeline criado por mês
  {
    // Build monthly pipeline creation data from RAW (all deals, not date-filtered)
    const monthCounts={FF:{},JM:{}};
    RAW.forEach(d=>{
      if(!d.cd) return;
      const mo=d.cd.substring(0,7); // YYYY-MM
      if(!monthCounts[d.o]) return;
      monthCounts[d.o][mo]=(monthCounts[d.o][mo]||0)+1;
    });
    // Get sorted months (last 6 months from "now")
    const allMonths=new Set([...Object.keys(monthCounts.FF||{}),...Object.keys(monthCounts.JM||{})]);
    const sortedMonths=[...allMonths].sort().slice(-6);
    const MON=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const labels=sortedMonths.map(m=>{const[y,mo]=m.split('-');return MON[parseInt(mo)-1]+' '+y.slice(2);});
    const ffData=sortedMonths.map(m=>monthCounts.FF[m]||0);
    const jmData=sortedMonths.map(m=>monthCounts.JM[m]||0);
    const totalData=sortedMonths.map((_,i)=>(ffData[i]||0)+(jmData[i]||0));

    h+='<div class="section"><div class="section-title">Pipeline Criado por Mês</div><div class="section-sub">Novos deals abertos (últimos 6 meses)</div>';
    h+='<div class="card" style="padding:20px">';
    h+='<canvas id="chart-pipeline-month" height="90"></canvas>';
    h+='<div style="display:flex;gap:20px;margin-top:12px;font-size:11px;justify-content:center">';
    h+='<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#4FC3F7;margin-right:4px"></span>Francisco</span>';
    h+='<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#AED581;margin-right:4px"></span>Malaquias</span>';
    h+='</div>';
    h+='</div></div>';

    // Store data for chart rendering
    window._pipelineChart={labels,ffData,jmData,totalData};
  }

  // Section 4: Stage time
  h+='<div class="section"><div class="section-title">Tempo Médio por Stage</div><div class="section-sub">Dias em Signing e Contracts Unicre</div>';
  h+='<div class="grid2">';
  h+='<div class="card"><div style="color:'+C.lime+';font-size:13px;font-weight:700;margin-bottom:10px">Signing</div>';
  h+='<div style="display:flex;gap:16px;align-items:center">';
  h+='<div class="stage-card" style="flex-shrink:0;min-width:100px"><div class="stage-num" style="color:'+C.lime+'">'+(m.avgSigG!==null?m.avgSigG:" · ")+'</div><div class="stage-unit">dias · '+m.sigCG+' deals</div></div>';
  h+='<div style="flex:1">';
  if(ff) h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #2A608033"><span>Francisco</span><span style="font-weight:700">'+(ff.avgSig!==null?ff.avgSig+"d":" · ")+' <span style="color:'+C.muted+';font-size:9px">('+ff.sigCount+')</span></span></div>';
  if(jm) h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0"><span>Malaquias</span><span style="font-weight:700">'+(jm.avgSig!==null?jm.avgSig+"d":" · ")+' <span style="color:'+C.muted+';font-size:9px">('+jm.sigCount+')</span></span></div>';
  h+='</div></div></div>';
  h+='<div class="card"><div style="color:'+C.jm+';font-size:13px;font-weight:700;margin-bottom:10px">Contracts Unicre</div>';
  h+='<div style="display:flex;gap:16px;align-items:center">';
  h+='<div class="stage-card" style="flex-shrink:0;min-width:100px"><div class="stage-num" style="color:'+C.jm+'">'+(m.avgCUG!==null?m.avgCUG:" · ")+'</div><div class="stage-unit">dias · '+m.cuCG+' deals</div></div>';
  h+='<div style="flex:1">';
  if(ff) h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #2A608033"><span>Francisco</span><span style="font-weight:700">'+(ff.avgCU!==null?ff.avgCU+"d":" · ")+' <span style="color:'+C.muted+';font-size:9px">('+ff.cuCount+')</span></span></div>';
  if(jm) h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0"><span>Malaquias</span><span style="font-weight:700">'+(jm.avgCU!==null?jm.avgCU+"d":" · ")+' <span style="color:'+C.muted+';font-size:9px">('+jm.cuCount+')</span></span></div>';
  h+='</div></div></div>';
  h+='</div></div>';

  // Section 5: Funnels
  h+='<div class="section"><div class="section-title">Funil Stage-to-Stage</div><div class="section-sub">Conversão entre stages</div>';
  h+='<div class="grid2">';
  if(ff) h+='<div class="card">'+funnelHTML("Francisco Faro",ff.fc,C.ff)+'</div>';
  if(jm) h+='<div class="card">'+funnelHTML("João Malaquias",jm.fc,C.jm)+'</div>';
  h+='</div></div>';

  document.getElementById("content").innerHTML=h;

  // Charts
  setTimeout(()=>{
    // Donut rings (conversion)
    if(ff&&jm){
      [ff,jm].forEach(o=>{
        const el=document.getElementById("ring-"+o.name.split(" ")[0]);
        if(!el)return;
        const color=o.cr>=8?C.lime:o.cr>=4?C.warning:C.danger;
        charts.push(new Chart(el,{type:"doughnut",data:{datasets:[{data:[o.cr,100-o.cr],backgroundColor:[color,C.teal+"33"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"75%",plugins:{legend:{display:false},tooltip:{enabled:false}}}}));
      });
    }

    // Pipeline por Mês bar chart
    if(window._pipelineChart){
      const pc=window._pipelineChart;
      const el=document.getElementById("chart-pipeline-month");
      if(el){
        charts.push(new Chart(el,{type:"bar",data:{
          labels:pc.labels,
          datasets:[
            {label:"Francisco",data:pc.ffData,backgroundColor:"#4FC3F7",borderRadius:3,stack:"s"},
            {label:"Malaquias",data:pc.jmData,backgroundColor:"#AED581",borderRadius:3,stack:"s"}
          ]
        },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1A3A4A",titleColor:"#fff",bodyColor:"#fff",borderColor:"#2A6080",borderWidth:1}},scales:{x:{grid:{color:"#2A608033"},ticks:{color:"#7BA7BC",font:{size:10}}},y:{grid:{color:"#2A608033"},ticks:{color:"#7BA7BC",font:{size:10},stepSize:10},beginAtZero:true}}}}));
      }
    }
  },50);
}

// Presets
const presetsEl=document.getElementById("presets");
PRESETS.forEach((p,i)=>{
  const btn=document.createElement("button");
  btn.className="preset"+(i===0?" active":"");
  btn.textContent=p.label;
  btn.onclick=()=>{
    activePreset=i;
    document.getElementById("date-from").value=p.from;
    document.getElementById("date-to").value=p.to;
    document.querySelectorAll(".preset").forEach((b,j)=>b.className="preset"+(j===i?" active":""));
    render();
  };
  presetsEl.appendChild(btn);
});

// Won mode
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.onclick=()=>{
    wonMode=btn.dataset.mode;
    document.querySelectorAll(".mode-btn").forEach(b=>b.className="mode-btn");
    btn.className="mode-btn active";
    document.getElementById("mode-hint").textContent=MODE_HINTS[wonMode];
    render();
  };
});

document.getElementById("date-from").onchange=()=>{document.querySelectorAll(".preset").forEach(b=>b.className="preset");render();};
document.getElementById("date-to").onchange=()=>{document.querySelectorAll(".preset").forEach(b=>b.className="preset");render();};

render();
</script>
</body>
</html>
